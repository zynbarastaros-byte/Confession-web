<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kupal Ka Ba?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Itim&family=Lilita+One&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fff9f0;
    --yellow: #ffe94a;
    --orange: #ff6b2b;
    --red: #ff2d55;
    --dark: #1a1a1a;
    --green: #00c853;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Itim', cursive;
    overflow: hidden;
    position: relative;
  }

  /* Zigzag background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,107,43,0.06) 20px,
      rgba(255,107,43,0.06) 21px
    );
    pointer-events: none;
  }

  /* Floating emojis */
  .emoji-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .emoji-bg span {
    position: absolute;
    font-size: 2rem;
    opacity: 0.12;
    animation: floatEmoji linear infinite;
  }

  @keyframes floatEmoji {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.12; }
    90% { opacity: 0.12; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Main card */
  .card {
    background: white;
    border: 4px solid var(--dark);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 480px;
    width: 90%;
    position: relative;
    box-shadow: 8px 8px 0px var(--dark);
    animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    z-index: 10;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5) rotate(-5deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* Decorative top strip */
  .card::before {
    content: '';
    position: absolute;
    top: -4px; left: -4px; right: -4px;
    height: 14px;
    background: repeating-linear-gradient(90deg, var(--yellow) 0px, var(--yellow) 20px, var(--orange) 20px, var(--orange) 40px, var(--red) 40px, var(--red) 60px);
    border-radius: 20px 20px 0 0;
    border-bottom: 4px solid var(--dark);
  }

  .sticker {
    display: inline-block;
    background: var(--yellow);
    border: 3px solid var(--dark);
    border-radius: 50%;
    width: 80px; height: 80px;
    line-height: 80px;
    font-size: 2.8rem;
    margin-bottom: 1.2rem;
    margin-top: 0.8rem;
    box-shadow: 4px 4px 0 var(--dark);
    animation: wiggle 2s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%,100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
  }

  .question {
    font-family: 'Lilita One', cursive;
    font-size: clamp(2rem, 7vw, 3rem);
    color: var(--dark);
    line-height: 1.1;
    margin-bottom: 0.5rem;
    letter-spacing: 0.02em;
  }

  .question span {
    color: var(--orange);
    text-decoration: underline wavy var(--red);
    text-underline-offset: 4px;
  }

  .subtext {
    font-size: 0.9rem;
    color: #999;
    margin-bottom: 2rem;
  }

  /* Buttons row */
  .buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    min-height: 64px;
    align-items: center;
  }

  .btn {
    font-family: 'Lilita One', cursive;
    font-size: 1.3rem;
    padding: 0.75rem 2.2rem;
    border: 3px solid var(--dark);
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.05em;
  }
  .btn:active { transform: translate(3px,3px); box-shadow: none !important; }

  .btn-oo {
    background: var(--green);
    color: white;
    box-shadow: 4px 4px 0 var(--dark);
  }
  .btn-oo:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--dark); }

  .btn-hindi {
    background: var(--red);
    color: white;
    box-shadow: 4px 4px 0 var(--dark);
    position: fixed;
    transition: none;
    z-index: 999;
  }

  /* Result text */
  .result {
    display: none;
    margin-top: 1.5rem;
    animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .result.show { display: block; }

  @keyframes bounceIn {
    from { opacity: 0; transform: scale(0.3); }
    to   { opacity: 1; transform: scale(1); }
  }

  .result-text {
    font-family: 'Lilita One', cursive;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--orange);
    line-height: 1.4;
  }

  .result-text span {
    color: var(--red);
    font-size: 1.2em;
  }

  .confetti-emoji {
    font-size: 2rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: spin 1s ease-in-out;
  }

  @keyframes spin {
    from { transform: rotate(0deg) scale(0); }
    to   { transform: rotate(720deg) scale(1); }
  }

  /* Shake animation for hindi button escape */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
</style>
</head>
<body>

<div class="emoji-bg" id="emojiBg"></div>

<div class="card" id="card">
  <div class="sticker">🤨</div>
  <h1 class="question">Kupal <span>ka ba?</span></h1>
  <p class="subtext">Sagutin ng tapat ha 👀</p>

  <div class="buttons" id="btnRow">
    <button class="btn btn-oo" onclick="clickOo()">Oo</button>
    <button class="btn btn-hindi" id="hindiBtn" onclick="escapeHindi()">Hindi</button>
  </div>

  <div class="result" id="result">
    <span class="confetti-emoji">🎉</span>
    <p class="result-text">Uy! <span>Inamin na!</span><br>Kupal ka nga talaga! 😂🔥</p>
  </div>
</div>

<script>
  // Spawn floating emojis
  const emojis = ['😂','💀','🤣','😭','🔥','💅','🫡','😤','🤡','👀','💀','😈'];
  const bg = document.getElementById('emojiBg');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('span');
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (8 + Math.random() * 10) + 's';
    s.style.animationDelay = (Math.random() * 10) + 's';
    s.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
    bg.appendChild(s);
  }

  // Position hindi button initially beside oo button
  const hindiBtn = document.getElementById('hindiBtn');
  let escaped = false;

  function positionHindiInitial() {
    const btnRow = document.getElementById('btnRow');
    const rect = btnRow.getBoundingClientRect();
    hindiBtn.style.top = rect.top + 'px';
    hindiBtn.style.left = (rect.left + rect.width / 2 + 20) + 'px';
  }

  window.addEventListener('load', positionHindiInitial);
  window.addEventListener('resize', positionHindiInitial);

  function escapeHindi() {
    // Move to random position away from cursor
    moveHindiRandom();
  }

  function moveHindiRandom() {
    const btnW = hindiBtn.offsetWidth;
    const btnH = hindiBtn.offsetHeight;
    const maxX = window.innerWidth - btnW - 20;
    const maxY = window.innerHeight - btnH - 20;

    let newX, newY;
    // Try to pick position far from current
    const curX = parseInt(hindiBtn.style.left) || window.innerWidth / 2;
    const curY = parseInt(hindiBtn.style.top) || window.innerHeight / 2;

    do {
      newX = 20 + Math.random() * maxX;
      newY = 20 + Math.random() * maxY;
    } while (Math.abs(newX - curX) < 150 && Math.abs(newY - curY) < 150);

    hindiBtn.style.left = newX + 'px';
    hindiBtn.style.top = newY + 'px';
    hindiBtn.style.transform = 'rotate(' + (Math.random() * 20 - 10) + 'deg)';
  }

  // Also escape on mouseover (desktop)
  hindiBtn.addEventListener('mouseover', moveHindiRandom);
  hindiBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    moveHindiRandom();
  });

  function clickOo() {
    document.getElementById('result').classList.add('show');
    document.getElementById('btnRow').style.display = 'none';
    // Hide hindi button
    hindiBtn.style.display = 'none';
    // Shake card
    const card = document.getElementById('card');
    card.style.animation = 'none';
    card.style.animation = 'shake 0.4s ease';
    // Change sticker
    document.querySelector('.sticker').textContent = '😂';
    document.querySelector('.question').innerHTML = 'KUPAL KA <span>TALAGA!</span>';
    document.querySelector('.subtext').textContent = 'Di ka makakalusot dito 💀';
  }
</script>
</body>
</html>
